<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="100%" height="100%">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <clipPath id="cutout">
      <!-- Top half -->
      <rect x="0" y="0" width="320" height="60" />
      <!-- Bottom half -->
      <rect x="0" y="96" width="320" height="64" />
    </clipPath>
  </defs>

  <!-- Large 'H' and 'D' -->
  <g clip-path="url(#cutout)" fill="url(#logo-grad)">
    <text x="90" y="130" font-family="Georgia, serif" font-size="160" font-weight="normal" text-anchor="middle">H</text>
    <text x="230" y="130" font-family="Georgia, serif" font-size="160" font-weight="normal" text-anchor="middle">D</text>
  </g>

  <!-- 'HETVI DOSHI' text -->
  <text x="160" y="86" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="4" text-anchor="middle" fill="#ffffff">HETVI DOSHI</text>
</svg>
